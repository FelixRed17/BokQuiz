databases:
  - name: fifaquiz-db
    databaseName: fifaquiz
    user: fifaquiz
    plan: free
    region: frankfurt

services:
  - type: web
    name: fifaquiz-api
    runtime: ruby
    plan: free
    region: frankfurt
    buildCommand: "bash bin/render-build.sh"
    # preDeployCommand: "bundle exec rails db:migrate" # paid plans only
    startCommand: "bash bin/koyeb-start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fifaquiz-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"
      # If you add a Redis instance on Render, also add:
      # - key: REDIS_URL
      #   sync: false


